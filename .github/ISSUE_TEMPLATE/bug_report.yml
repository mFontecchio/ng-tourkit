name: Bug report
description: Report unexpected behavior in ng-tourkit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a small reproduction.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ng-tourkit version
      placeholder: 0.0.1
    validations:
      required: true
  - type: input
    id: angular
    attributes:
      label: Angular version
      placeholder: 20.3.x
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, stack traces, screenshots, etc.
