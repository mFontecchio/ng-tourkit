name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm (OIDC / trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build library
        run: npx ng build ng-tourkit

      - name: Include license in package
        run: cp LICENSE dist/ng-tourkit/LICENSE

      - name: Publish @mfontecchio/ng-tourkit
        working-directory: dist/ng-tourkit
        run: npm publish --access public
